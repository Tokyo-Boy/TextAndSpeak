<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TextAndSpeak Pro - Desktop</title>
    <style>
        :root { --primary-color: #007AFF; --secondary-color: #5856D6; --stop-color: #FF3B30; --bg-color: #000; --card-bg: #1C1C1E; --text-main: #FFFFFF; }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg-color); display: flex; justify-content: center; padding-top: 20px; color: var(--text-main); }
        .container { background: var(--card-bg); padding: 24px; border-radius: 24px; width: 92%; max-width: 450px; position: relative; }
        
        /* Home Button Styling */
        .home-link { position: absolute; top: 15px; left: 15px; text-decoration: none; color: #8E8E93; font-size: 12px; font-weight: 600; }
        .home-link:hover { color: white; }

        textarea { width: 100%; height: 120px; padding: 16px; border: 1px solid #3A3A3C; border-radius: 16px; background: #2C2C2E; color: #FFF; outline: none; resize: none; margin-bottom: 10px; box-sizing: border-box; margin-top: 15px; }
        .select-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .field { display: flex; flex-direction: column; }
        label { font-size: 10px; font-weight: 700; color: #8E8E93; margin-bottom: 4px; text-transform: uppercase; }
        select { padding: 0 8px; border-radius: 10px; border: 1px solid #3A3A3C; background: #2C2C2E; color: #FFF; height: 40px; }
        .full-width { grid-column: span 2; }
        #translateBtn { background-color: var(--secondary-color); color: white; width: 100%; margin-bottom: 12px; height: 50px; border-radius: 14px; border: none; font-weight: 600; cursor: pointer; display: none; }
        .action-group { display: grid; grid-template-columns: 2fr 1fr; gap: 12px; }
        button { border: none; height: 50px; border-radius: 14px; font-size: 16px; font-weight: 600; cursor: pointer; }
        #speakBtn { background-color: var(--primary-color); color: white; }
        #stopBtn { background-color: #3A3A3C; color: var(--stop-color); }
        .slider-group { margin: 15px 0; }
        input[type=range] { width: 100%; accent-color: var(--primary-color); }
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="home-link">← HOME</a>
    <textarea id="textInput" placeholder="Type here..."></textarea>
    <button id="translateBtn">Translate to Japanese 🇯🇵</button>
    <div class="select-group">
        <div class="field">
            <label>Region</label>
            <select id="langSelect">
                <option value="en-US">USA</option>
                <option value="en-GB">UK</option>
                <option value="ja-JP">Japan</option>
            </select>
        </div>
        <div class="field">
            <label>Gender</label>
            <select id="genderSelect">
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>
        </div>
        <div class="field full-width">
            <label>Premium Desktop Voices</label>
            <select id="voicePicker"></select>
        </div>
    </div>
    <div class="slider-group">
        <label style="font-size:10px; color:#8E8E93;">SPEED: <span id="speedVal">1.0x</span></label>
        <input type="range" id="rate" min="0.5" max="1.5" step="0.1" value="1.0">
    </div>
    <div class="action-group">
        <button id="speakBtn">Speak</button>
        <button id="stopBtn">Stop</button>
    </div>
</div>

<script>
    const synth = window.speechSynthesis;
    const voicePicker = document.getElementById('voicePicker');
    const langSelect = document.getElementById('langSelect');
    const genderSelect = document.getElementById('genderSelect');
    const transBtn = document.getElementById('translateBtn');
    let lastVoice = "";

    // Expanded blacklist to catch female voices hiding in the male list
    const FEMALE_NAMES = ['aria', 'jenny', 'emma', 'ana', 'michelle', 'ava', 'samantha', 'victoria', 'kyoko', 'nanami', 'siri', 'karen', 'moira', 'martha', 'helena', 'zira', 'linda', 'susan', 'catherine', 'hazel', 'female'];

    function populate() {
        const voices = synth.getVoices();
        voicePicker.innerHTML = '';
        transBtn.style.display = langSelect.value === "ja-JP" ? "block" : "none";

        const filtered = voices.filter(v => 
            v.lang.includes(langSelect.value) && 
            (v.name.toLowerCase().includes('online') || v.name.toLowerCase().includes('natural'))
        ).filter(v => {
            const name = v.name.toLowerCase();
            const isFemaleIdentified = FEMALE_NAMES.some(f => name.includes(f));
            
            if (genderSelect.value === 'male') {
                return !isFemaleIdentified; // Only keep if NOT in the female list
            } else {
                return isFemaleIdentified; // Only keep if IS in the female list
            }
        });

        filtered.forEach(v => {
            const opt = document.createElement('option');
            opt.value = v.name;
            opt.textContent = "🌿 " + v.name.replace('Microsoft', '').replace('Google', '').trim();
            if (v.name === lastVoice) opt.selected = true;
            voicePicker.appendChild(opt);
        });
    }

    langSelect.onchange = populate;
    genderSelect.onchange = populate;
    voicePicker.onchange = () => lastVoice = voicePicker.value;
    synth.onvoiceschanged = populate;

    document.getElementById('speakBtn').onclick = () => {
        synth.cancel();
        const text = document.getElementById('textInput').value;
        if(!text) return;
        const utter = new SpeechSynthesisUtterance(text);
        utter.voice = synth.getVoices().find(v => v.name === voicePicker.value);
        utter.rate = document.getElementById('rate').value;
        synth.speak(utter);
    };

    document.getElementById('translateBtn').onclick = async function() {
        const text = document.getElementById('textInput').value;
        if (!text) return;
        this.innerText = "Translating...";
        try {
            const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|ja`);
            const data = await res.json();
            if (data.responseData.translatedText) {
                document.getElementById('textInput').value = data.responseData.translatedText;
            }
        } catch (e) { alert("Translation failed."); }
        finally { this.innerText = "Translate to Japanese 🇯🇵"; }
    };

    document.getElementById('stopBtn').onclick = () => synth.cancel();
    document.getElementById('rate').oninput = (e) => document.getElementById('speedVal').innerText = e.target.value + 'x';
    setTimeout(populate, 500);
</script>
</body>
</html>
