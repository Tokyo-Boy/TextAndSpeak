<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TextAndSpeak Pro</title>
    <style>
        :root { --primary: #007AFF; --bg: #000; --card: #1C1C1E; --text: #FFF; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { background: var(--card); padding: 24px; border-radius: 24px; width: 90%; max-width: 400px; }
        textarea { width: 100%; height: 120px; padding: 15px; border-radius: 16px; border: 1px solid #3A3A3C; background: #2C2C2E; color: #FFF; font-size: 16px; margin-bottom: 15px; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .field { display: flex; flex-direction: column; }
        label { font-size: 10px; color: #8E8E93; font-weight: 700; margin-bottom: 4px; text-transform: uppercase; }
        select { background: #2C2C2E; color: #FFF; border: 1px solid #3A3A3C; padding: 10px; border-radius: 12px; font-size: 14px; appearance: none; }
        button { width: 100%; height: 50px; border-radius: 14px; border: none; font-weight: 600; font-size: 16px; cursor: pointer; margin-bottom: 10px; }
        #speakBtn { background: var(--primary); color: #FFF; }
        #stopBtn { background: #3A3A3C; color: #FF3B30; }
        #translateBtn { background: #5856D6; color: #FFF; display: none; }
    </style>
</head>
<body>

<div class="container">
    <textarea id="textInput">Hello, how are you?</textarea>
    
    <button id="translateBtn" onclick="doTranslate()">Translate to Japanese 🇯🇵</button>

    <div class="grid">
        <div class="field">
            <label>Region</label>
            <select id="langSelect" onchange="refreshVoices(); checkJP();">
                <option value="en-US">USA</option>
                <option value="en-GB">UK</option>
                <option value="ja-JP">Japan</option>
            </select>
        </div>
        <div class="field">
            <label>Gender</label>
            <select id="genderSelect" onchange="refreshVoices()">
                <option value="female">Female</option>
                <option value="male">Male</option>
            </select>
        </div>
    </div>

    <div class="field" style="margin-bottom: 20px;">
        <label>Choose Voice</label>
        <select id="voicePicker"></select>
    </div>

    <button id="speakBtn" onclick="speak()">Speak Now</button>
    <button id="stopBtn" onclick="window.speechSynthesis.cancel()">Stop</button>
</div>

<script>
    const synth = window.speechSynthesis;
    let voices = [];

    // 1. Get voices and handle mobile delay
    function refreshVoices() {
        voices = synth.getVoices();
        const lang = document.getElementById('langSelect').value;
        const gender = document.getElementById('genderSelect').value;
        const picker = document.getElementById('voicePicker');
        
        picker.innerHTML = '';

        // Keywords to identify genders
        const femaleKeys = ['samantha', 'siri', 'karen', 'victoria', 'moira', 'kyoko', 'female', 'voice 2', 'voice 4', 'martha'];
        
        const filtered = voices.filter(v => {
            const isLang = v.lang.includes(lang.replace('-', '_')) || v.lang.includes(lang);
            const name = v.name.toLowerCase();
            const isFemale = femaleKeys.some(k => name.includes(k));
            return gender === 'female' ? (isLang && isFemale) : (isLang && !isFemale);
        });

        filtered.forEach(v => {
            const opt = document.createElement('option');
            opt.value = v.name;
            opt.textContent = v.name.split('(')[0].replace('Google', '').replace('Apple', '').trim();
            picker.appendChild(opt);
        });

        if(picker.options.length === 0) {
            const opt = document.createElement('option');
            opt.textContent = "Default Voice";
            picker.appendChild(opt);
        }
    }

    // 2. The Speak Function
    function speak() {
        synth.cancel();
        const text = document.getElementById('textInput').value;
        if (!text) return;

        const utter = new SpeechSynthesisUtterance(text);
        const selectedName = document.getElementById('voicePicker').value;
        const voice = voices.find(v => v.name === selectedName);

        if (voice) utter.voice = voice;
        utter.lang = document.getElementById('langSelect').value;
        
        synth.speak(utter);
    }

    // 3. Translation logic
    async function doTranslate() {
        const btn = document.getElementById('translateBtn');
        const input = document.getElementById('textInput');
        btn.innerText = "Working...";
        try {
            const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(input.value)}&langpair=en|ja`);
            const data = await res.json();
            input.value = data.responseData.translatedText;
        } finally {
            btn.innerText = "Translate to Japanese 🇯🇵";
        }
    }

    function checkJP() {
        document.getElementById('translateBtn').style.display = 
            document.getElementById('langSelect').value === "ja-JP" ? "block" : "none";
    }

    // Fix for Chrome/Safari voice loading
    window.onload = () => {
        refreshVoices();
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = refreshVoices;
        }
    };
</script>
</body>
</html>
