<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TextAndSpeak Pro</title>
    <style>
        :root { --primary: #007AFF; --bg: #000; --card: #1C1C1E; --text: #FFF; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding-top: 20px; margin: 0; }
        .container { background: var(--card); padding: 24px; border-radius: 24px; width: 92%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        textarea { width: 100%; height: 160px; padding: 16px; border: 1px solid #3A3A3C; border-radius: 16px; background: #2C2C2E; color: #FFF; outline: none; resize: none; margin-bottom: 20px; box-sizing: border-box; font-size: 17px; }
        .field { display: flex; flex-direction: column; margin-bottom: 20px; }
        label { font-size: 10px; font-weight: 700; color: #8E8E93; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        select { padding: 14px; border-radius: 12px; border: 1px solid #3A3A3C; background: #2C2C2E; color: #FFF; font-size: 16px; appearance: none; font-weight: 500; }
        
        button { width: 100%; height: 55px; border-radius: 16px; border: none; font-size: 17px; font-weight: 600; cursor: pointer; transition: opacity 0.1s; }
        button:active { opacity: 0.7; }
        #speakBtn { background: var(--primary); color: white; margin-bottom: 12px; }
        #stopBtn { background: #3A3A3C; color: #FF3B30; }
        #translateBtn { background: #5856D6; color: white; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <textarea id="textInput" placeholder="Type something..."></textarea>
    
    <button id="translateBtn" onclick="doTranslate()">Translate to Japanese 🇯🇵</button>

    <div class="field">
        <label>Select Voice Region</label>
        <select id="langSelect" onchange="checkJP()">
            <option value="en-US">USA (Female) 🇺🇸</option>
            <option value="en-GB">UK (Male) 🇬🇧</option>
            <option value="ja-JP">Japan (Female) 🇯🇵</option>
        </select>
    </div>

    <button id="speakBtn" onclick="speak()">Speak Now</button>
    <button id="stopBtn" onclick="stopAudio()">Stop</button>
</div>

<script>
    const synth = window.speechSynthesis;

    function checkJP() {
        const isJP = document.getElementById('langSelect').value === "ja-JP";
        document.getElementById('translateBtn').style.display = isJP ? "block" : "none";
    }

    function findLockedVoice(region) {
        const voices = synth.getVoices();
        const regionalVoices = voices.filter(v => v.lang.replace('_', '-').includes(region));

        // Setup the specific search requirements
        const searchConfig = {
            'en-US': { 
                include: ['samantha', 'siri', 'ava', 'allison', 'voice 2', 'voice 4'], 
                exclude: ['nathan', 'aaron', 'alex', 'voice 1', 'voice 3'] 
            },
            'en-GB': { 
                include: ['daniel', 'oliver', 'arthur', 'george', 'voice 1', 'voice 3'], 
                exclude: ['martha', 'serena', 'hazel', 'libby', 'voice 2', 'voice 4'] 
            },
            'ja-JP': { 
                include: ['kyoko', 'nanami', 'aoi', 'voice 2', 'voice 4'], 
                exclude: ['ichiro', 'keita', 'voice 1', 'voice 3'] 
            }
        };

        const target = searchConfig[region];

        // 1. Try to find a voice that matches an "Include" name AND doesn't have an "Exclude" name
        let bestMatch = regionalVoices.find(v => {
            const name = v.name.toLowerCase();
            return target.include.some(inc => name.includes(inc)) && 
                   !target.exclude.some(exc => name.includes(exc));
        });

        // 2. Return the best match found, or just the first regional voice as a safety net
        return bestMatch || regionalVoices[0];
    }

    async function speak() {
        const text = document.getElementById('textInput').value;
        const region = document.getElementById('langSelect').value;
        const btn = document.getElementById('speakBtn');

        if (!text) return;
        synth.cancel();

        const utter = new SpeechSynthesisUtterance(text);
        const voice = findLockedVoice(region);

        if (voice) {
            utter.voice = voice;
            utter.lang = voice.lang;
        }

        utter.rate = 1.0;
        btn.innerText = "Speaking...";
        
        synth.speak(utter);
        
        utter.onend = () => { btn.innerText = "Speak Now"; };
    }

    function stopAudio() {
        synth.cancel();
        document.getElementById('speakBtn').innerText = "Speak Now";
    }

    async function doTranslate() {
        const input = document.getElementById('textInput');
        const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(input.value)}&langpair=en|ja`);
        const data = await res.json();
        input.value = data.responseData.translatedText;
    }

    window.onload = () => {
        synth.getVoices();
        checkJP();
    };
    
    if (speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = () => synth.getVoices();
    }
</script>
</body>
</html>
