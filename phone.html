<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TextAndSpeak Pro - Mobile</title>
    <style>
        :root { --primary-color: #007AFF; --secondary-color: #5856D6; --stop-color: #FF3B30; --bg-color: #000; --card-bg: #1C1C1E; --text-main: #FFFFFF; }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg-color); display: flex; justify-content: center; padding-top: 20px; color: var(--text-main); margin: 0; }
        .container { background: var(--card-bg); padding: 24px; border-radius: 24px; width: 90%; max-width: 400px; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .home-link { position: absolute; top: 15px; left: 15px; text-decoration: none; color: #8E8E93; font-size: 12px; font-weight: 600; }
        textarea { width: 100%; height: 140px; padding: 16px; border: 1px solid #3A3A3C; border-radius: 16px; background: #2C2C2E; color: #FFF; outline: none; resize: none; margin-bottom: 12px; box-sizing: border-box; font-size: 16px; margin-top: 20px; }
        .select-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .field { display: flex; flex-direction: column; }
        label { font-size: 10px; font-weight: 700; color: #8E8E93; margin-bottom: 4px; text-transform: uppercase; }
        select { padding: 0 10px; border-radius: 12px; border: 1px solid #3A3A3C; background: #2C2C2E; color: #FFF; height: 44px; font-size: 14px; appearance: none; }
        #translateBtn { background-color: var(--secondary-color); color: white; width: 100%; margin-bottom: 12px; height: 50px; border-radius: 14px; border: none; font-weight: 600; display: none; cursor: pointer; }
        .action-group { display: grid; grid-template-columns: 2fr 1fr; gap: 12px; }
        button { border: none; height: 55px; border-radius: 16px; font-size: 17px; font-weight: 600; cursor: pointer; active { opacity: 0.7; } }
        #speakBtn { background-color: var(--primary-color); color: white; }
        #stopBtn { background-color: #3A3A3C; color: var(--stop-color); }
        .slider-group { margin: 15px 0; }
        input[type=range] { width: 100%; accent-color: var(--primary-color); height: 25px; }
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="home-link">← HOME</a>
    <textarea id="textInput" placeholder="Enter text...">Hello</textarea>
    <button id="translateBtn">Translate to Japanese 🇯🇵</button>
    
    <div class="select-group">
        <div class="field">
            <label>Region</label>
            <select id="langSelect" onchange="checkJP()">
                <option value="en-US">USA</option>
                <option value="en-GB">UK</option>
                <option value="ja-JP">Japan</option>
            </select>
        </div>
        <div class="field">
            <label>Gender</label>
            <select id="genderSelect">
                <option value="female">Female</option>
                <option value="male">Male</option>
            </select>
        </div>
    </div>

    <div class="slider-group">
        <label style="font-size:10px; color:#8E8E93;">SPEED: <span id="speedVal">1.0x</span></label>
        <input type="range" id="rate" min="0.5" max="1.5" step="0.1" value="1.0">
    </div>

    <div class="action-group">
        <button id="speakBtn">Speak Now</button>
        <button id="stopBtn">Stop</button>
    </div>
</div>

<script>
    const synth = window.speechSynthesis;

    function checkJP() {
        const isJP = document.getElementById('langSelect').value === "ja-JP";
        document.getElementById('translateBtn').style.display = isJP ? "block" : "none";
    }

    function getSpecificVoice() {
        const voices = synth.getVoices();
        const lang = document.getElementById('langSelect').value;
        const gender = document.getElementById('genderSelect').value;

        // The specific "Gold Standard" voices for mobile
        const targets = {
            'en-US': { male: ['aaron', 'nathan', 'samatha', 'maryland', 'voice 1', 'voice 3'], female: ['samantha', 'siri', 'voice 2', 'voice 4'] },
            'en-GB': { male: ['daniel', 'oliver', 'george'], female: ['martha', 'libby', 'hazel', 'serena'] },
            'ja-JP': { male: ['keita', 'ichiro'], female: ['kyoko', 'nanami', 'aoi'] }
        };

        const currentTargets = targets[lang][gender];
        const regionalVoices = voices.filter(v => v.lang.toLowerCase().includes(lang.toLowerCase()));

        // Search for the specific targeted high-quality voice
        let bestMatch = regionalVoices.find(v => 
            currentTargets.some(name => v.name.toLowerCase().includes(name))
        );

        // Fallback: If target isn't found, just pick any from that region/gender
        return bestMatch || regionalVoices[0];
    }

    document.getElementById('speakBtn').onclick = () => {
        synth.cancel();
        const text = document.getElementById('textInput').value;
        if (!text) return;

        const utter = new SpeechSynthesisUtterance(text);
        const voice = getSpecificVoice();
        
        if (voice) {
            utter.voice = voice;
            utter.lang = voice.lang;
        }
        
        utter.rate = document.getElementById('rate').value;
        synth.speak(utter);
    };

    document.getElementById('stopBtn').onclick = () => synth.cancel();
    document.getElementById('rate').oninput = (e) => document.getElementById('speedVal').innerText = e.target.value + 'x';

    document.getElementById('translateBtn').onclick = async function() {
        const input = document.getElementById('textInput');
        if (!input.value) return;
        this.innerText = "...";
        try {
            const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(input.value)}&langpair=en|ja`);
            const data = await res.json();
            if (data.responseData.translatedText) input.value = data.responseData.translatedText;
        } catch (e) { alert("Try again later"); }
        finally { this.innerText = "Translate to Japanese 🇯🇵"; }
    };

    // Load voices
    window.addEventListener('load', () => {
        synth.getVoices();
        checkJP();
    });
    if (speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = () => synth.getVoices();
    }
</script>
</body>
</html>
