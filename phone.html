<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TextAndSpeak Pro</title>
    <style>
        :root { --primary: #007AFF; --bg: #000; --card: #1C1C1E; --text: #FFF; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding-top: 20px; margin: 0; }
        .container { background: var(--card); padding: 24px; border-radius: 24px; width: 92%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        textarea { width: 100%; height: 140px; padding: 16px; border: 1px solid #3A3A3C; border-radius: 16px; background: #2C2C2E; color: #FFF; outline: none; resize: none; margin-bottom: 15px; box-sizing: border-box; font-size: 17px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .field { display: flex; flex-direction: column; }
        label { font-size: 10px; font-weight: 700; color: #8E8E93; margin-bottom: 5px; text-transform: uppercase; }
        select { padding: 12px; border-radius: 12px; border: 1px solid #3A3A3C; background: #2C2C2E; color: #FFF; font-size: 15px; appearance: none; }
        button { width: 100%; height: 55px; border-radius: 16px; border: none; font-size: 17px; font-weight: 600; cursor: pointer; transition: opacity 0.1s; }
        button:active { opacity: 0.7; }
        #speakBtn { background: var(--primary); color: white; margin-bottom: 10px; }
        #stopBtn { background: #3A3A3C; color: #FF3B30; }
        #translateBtn { background: #5856D6; color: white; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <textarea id="textInput" placeholder="Type something...">Hello, I am ready to speak.</textarea>
    
    <button id="translateBtn" onclick="doTranslate()">Translate to Japanese 🇯🇵</button>

    <div class="grid">
        <div class="field">
            <label>Region</label>
            <select id="langSelect" onchange="checkJP()">
                <option value="en-US">USA 🇺🇸</option>
                <option value="en-GB">UK 🇬🇧</option>
                <option value="ja-JP">Japan 🇯🇵</option>
            </select>
        </div>
        <div class="field">
            <label>Gender</label>
            <select id="genderSelect">
                <option value="FEMALE">Female</option>
                <option value="MALE">Male</option>
            </select>
        </div>
    </div>

    <button id="speakBtn" onclick="speak()">Speak Now</button>
    <button id="stopBtn" onclick="stopAudio()">Stop</button>
</div>

<script>
    const synth = window.speechSynthesis;

    function checkJP() {
        const isJP = document.getElementById('langSelect').value === "ja-JP";
        document.getElementById('translateBtn').style.display = isJP ? "block" : "none";
    }

    function findBestVoice(lang, gender) {
        const voices = synth.getVoices();
        
        // Exact priority list for mobile high-quality voices
        const priorities = {
            'en-US': {
                MALE: ['nathan', 'aaron', 'alex', 'sam', 'male', 'premium'],
                FEMALE: ['samantha', 'siri', 'ava', 'allison', 'female', 'enhanced']
            },
            'en-GB': {
                MALE: ['daniel', 'oliver', 'arthur', 'george', 'male'],
                FEMALE: ['martha', 'serena', 'hazel', 'libby', 'female']
            },
            'ja-JP': {
                MALE: ['ichiro', 'keita', 'male', 'google japanese'],
                FEMALE: ['kyoko', 'nanami', 'aoi', 'female']
            }
        };

        const searchList = priorities[lang][gender];
        const regionalVoices = voices.filter(v => v.lang.replace('_', '-').includes(lang));

        // 1. Look for the best specific match from the priority list
        for (let name of searchList) {
            let found = regionalVoices.find(v => v.name.toLowerCase().includes(name));
            if (found) return found;
        }

        // 2. Fallback to any regional voice if priority fails
        return regionalVoices[0];
    }

    async function speak() {
        const text = document.getElementById('textInput').value;
        const lang = document.getElementById('langSelect').value;
        const gender = document.getElementById('genderSelect').value;
        const btn = document.getElementById('speakBtn');

        if (!text) return;
        synth.cancel();

        const utter = new SpeechSynthesisUtterance(text);
        const bestVoice = findBestVoice(lang, gender);

        if (bestVoice) {
            utter.voice = bestVoice;
            utter.lang = bestVoice.lang; // Force language to match voice exactly
        } else {
            utter.lang = lang;
        }
        
        utter.rate = 1.0;
        utter.pitch = 1.0;

        btn.innerText = "Speaking...";
        synth.speak(utter);
        
        utter.onend = () => { btn.innerText = "Speak Now"; };
    }

    function stopAudio() {
        synth.cancel();
        document.getElementById('speakBtn').innerText = "Speak Now";
    }

    async function doTranslate() {
        const input = document.getElementById('textInput');
        const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(input.value)}&langpair=en|ja`);
        const data = await res.json();
        input.value = data.responseData.translatedText;
    }

    // Initialize - Important for mobile browsers
    window.onload = () => {
        synth.getVoices();
        checkJP();
    };
    if (speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = () => synth.getVoices();
    }
</script>
</body>
</html>
