<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TextAndSpeak Pro - Mobile</title>
    <style>
        :root { --primary-color: #007AFF; --secondary-color: #5856D6; --stop-color: #FF3B30; --bg-color: #000; --card-bg: #1C1C1E; --text-main: #FFFFFF; }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg-color); display: flex; justify-content: center; padding-top: 20px; color: var(--text-main); }
        .container { background: var(--card-bg); padding: 24px; border-radius: 24px; width: 92%; max-width: 450px; position: relative; }
        .home-link { position: absolute; top: 15px; left: 15px; text-decoration: none; color: #8E8E93; font-size: 12px; font-weight: 600; }
        textarea { width: 100%; height: 120px; padding: 16px; border: 1px solid #3A3A3C; border-radius: 16px; background: #2C2C2E; color: #FFF; outline: none; resize: none; margin-bottom: 10px; box-sizing: border-box; font-size: 16px; margin-top: 15px; }
        .select-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .field { display: flex; flex-direction: column; }
        label { font-size: 10px; font-weight: 700; color: #8E8E93; margin-bottom: 4px; text-transform: uppercase; }
        select { padding: 0 8px; border-radius: 10px; border: 1px solid #3A3A3C; background: #2C2C2E; color: #FFF; height: 40px; font-size: 14px; appearance: none; }
        #translateBtn { background-color: var(--secondary-color); color: white; width: 100%; margin-bottom: 12px; height: 50px; border-radius: 14px; border: none; font-weight: 600; display: none; cursor: pointer; }
        .action-group { display: grid; grid-template-columns: 2fr 1fr; gap: 12px; }
        button { border: none; height: 50px; border-radius: 14px; font-size: 16px; font-weight: 600; cursor: pointer; transition: opacity 0.1s; }
        button:active { opacity: 0.7; }
        #speakBtn { background-color: var(--primary-color); color: white; }
        #stopBtn { background-color: #3A3A3C; color: var(--stop-color); }
        .slider-group { margin: 15px 0; }
        input[type=range] { width: 100%; accent-color: var(--primary-color); }
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="home-link">← HOME</a>
    <textarea id="textInput" placeholder="Enter text...">Hello</textarea>
    <button id="translateBtn">Translate to Japanese 🇯🇵</button>
    <div class="select-group">
        <div class="field">
            <label>Region</label>
            <select id="langSelect" onchange="checkJP()">
                <option value="en-US">USA</option>
                <option value="en-GB">UK</option>
                <option value="ja-JP">Japan</option>
            </select>
        </div>
        <div class="field">
            <label>Gender</label>
            <select id="genderSelect">
                <option value="female">Female</option>
                <option value="male">Male</option>
            </select>
        </div>
    </div>
    <div class="slider-group">
        <label style="font-size:10px; color:#8E8E93;">SPEED: <span id="speedVal">1.0x</span></label>
        <input type="range" id="rate" min="0.5" max="1.5" step="0.1" value="1.0">
    </div>
    <div class="action-group">
        <button id="speakBtn">Speak Now</button>
        <button id="stopBtn">Stop</button>
    </div>
</div>

<script>
    const synth = window.speechSynthesis;
    
    function checkJP() {
        document.getElementById('translateBtn').style.display = 
            document.getElementById('langSelect').value === "ja-JP" ? "block" : "none";
    }

    function getBestVoice() {
        const voices = synth.getVoices();
        const lang = document.getElementById('langSelect').value;
        const gender = document.getElementById('genderSelect').value;
        
        // 1. Filter by Region
        let regionalVoices = voices.filter(v => v.lang.toLowerCase().includes(lang.toLowerCase()));

        // 2. Comprehensive Female Exclusion List (for Male selection)
        const femaleNames = [
            'aria', 'samantha', 'victoria', 'karen', 'kyoko', 'siri', 'female', 'ava', 'emma', 
            'jenny', 'michelle', 'zira', 'linda', 'susan', 'catherine', 'hazel', 'nanami', 
            'aoi', 'mayu', 'voice 2', 'voice 4', 'martha', 'libby', 'stephanie', 'moira'
        ];

        // 3. Comprehensive Male Keyword List
        const maleKeywords = [
            'aaron', 'nathan', 'fred', 'guy', 'david', 'mark', 'andrew', 'christopher', 
            'eric', 'roger', 'steffan', 'male', 'voice 1', 'voice 3', 'maryland', 'daniel', 
            'oliver', 'george', 'ichiro', 'keita'
        ];

        let filtered;
        if (gender === 'male') {
            // Priority: Explicitly Male names, and NO female names
            filtered = regionalVoices.filter(v => {
                const name = v.name.toLowerCase();
                const isMale = maleKeywords.some(m => name.includes(m));
                const isFemale = femaleNames.some(f => name.includes(f));
                return isMale || !isFemale;
            });
        } else {
            // Priority: Explicitly Female names
            filtered = regionalVoices.filter(v => {
                const name = v.name.toLowerCase();
                return femaleNames.some(f => name.includes(f));
            });
        }

        // 4. Quality Sort
        filtered.sort((a, b) => {
            const priority = ['premium', 'siri', 'enhanced', 'natural'];
            const aScore = priority.some(p => a.name.toLowerCase().includes(p)) ? 1 : 0;
            const bScore = priority.some(p => b.name.toLowerCase().includes(p)) ? 1 : 0;
            return bScore - aScore;
        });

        // Final Fallback: if filtered is empty, grab the first regional voice available
        return filtered[0] || regionalVoices[0];
    }

    document.getElementById('translateBtn').onclick = async function() {
        const textInput = document.getElementById('textInput');
        if (!textInput.value) return;
        this.innerText = "Translating...";
        try {
            const response = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(textInput.value)}&langpair=en|ja`);
            const data = await response.json();
            if (data.responseData && data.responseData.translatedText) {
                textInput.value = data.responseData.translatedText;
            }
        } catch (e) { 
            alert("Translation failed."); 
        } finally { 
            this.innerText = "Translate to Japanese 🇯🇵"; 
        }
    };

    document.getElementById('speakBtn').onclick = () => {
        synth.cancel();
        const text = document.getElementById('textInput').value;
        if (!text) return;

        const utter = new SpeechSynthesisUtterance(text);
        const bestVoice = getBestVoice();
        
        if (bestVoice) {
            utter.voice = bestVoice;
            utter.lang = bestVoice.lang;
        }

        utter.rate = document.getElementById('rate').value;
        synth.speak(utter);
    };

    document.getElementById('stopBtn').onclick = () => synth.cancel();
    document.getElementById('rate').oninput = (e) => document.getElementById('speedVal').innerText = e.target.value + 'x';

    window.addEventListener('load', () => {
        synth.getVoices();
        checkJP();
    });
    
    if (speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = () => synth.getVoices();
    }
</script>
</body>
</html>
