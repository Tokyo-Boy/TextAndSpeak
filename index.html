<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TextAndSpeak Pro</title>
    <style>
        :root {
            --primary-color: #007AFF;
            --secondary-color: #5856D6;
            --stop-color: #FF3B30;
            --bg-color: #F2F2F7;
            --card-bg: #FFFFFF;
            --text-main: #1C1C1E;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            padding-top: 20px;
            height: 100vh;
            box-sizing: border-box;
        }

        .container {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            width: 92%;
            max-width: 450px;
        }

        h2 { text-align: center; margin: 0 0 15px 0; color: var(--text-main); font-weight: 800; }

        textarea {
            width: 100%;
            height: 140px;
            padding: 16px;
            border: 1px solid #D1D1D6;
            border-radius: 16px;
            font-size: 16px;
            box-sizing: border-box;
            background: #F9F9F9;
            outline: none;
            resize: none;
            color: var(--text-main);
            margin-bottom: 10px;
        }

        .select-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }

        .field { display: flex; flex-direction: column; }
        label { font-size: 10px; font-weight: 700; color: #8E8E93; margin-bottom: 4px; text-transform: uppercase; }

        select {
            padding: 0 8px;
            border-radius: 10px;
            border: 1px solid #D1D1D6;
            background: #FFF;
            font-size: 13px;
            height: 40px;
            color: var(--text-main);
        }

        .full-width { grid-column: span 2; }

        .slider-group { margin-bottom: 20px; }
        .slider-header { display: flex; justify-content: space-between; margin-bottom: 4px; }
        input[type=range] { width: 100%; accent-color: var(--primary-color); }

        .action-group { display: grid; grid-template-columns: 2fr 1fr; gap: 12px; }

        button {
            border: none;
            height: 50px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:active { opacity: 0.7; }
        #translateBtn { background-color: var(--secondary-color); color: white; width: 100%; margin-bottom: 12px; }
        #speakBtn { background-color: var(--primary-color); color: white; }
        #stopBtn { background-color: #E5E5EA; color: var(--stop-color); }

        @media (prefers-color-scheme: dark) {
            :root { --bg-color: #000; --card-bg: #1C1C1E; --text-main: #FFF; }
            textarea, select { background: #2C2C2E; border-color: #3A3A3C; color: #FFF; }
            #stopBtn { background-color: #3A3A3C; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>TextAndSpeak</h2>
    <textarea id="textInput" placeholder="Type or paste here..."></textarea>
    
    <button id="translateBtn">Translate to Japanese 🇯🇵</button>

    <div class="select-group">
        <div class="field">
            <label>Region</label>
            <select id="langSelect">
                <option value="en-US">USA</option>
                <option value="en-GB">UK (British)</option>
                <option value="ja-JP">Japan</option>
            </select>
        </div>
        <div class="field">
            <label>Gender</label>
            <select id="genderSelect">
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>
        </div>
        <div class="field full-width">
            <label>Available Voices</label>
            <select id="voicePicker"></select>
        </div>
    </div>

    <div class="slider-group">
        <div class="slider-header"><label>Speed</label><span id="speedVal">1.0x</span></div>
        <input type="range" id="rate" min="0.5" max="1.5" step="0.1" value="1.0">
    </div>

    <div class="action-group">
        <button id="speakBtn">Speak Now</button>
        <button id="stopBtn">Stop</button>
    </div>
</div>

<script>
    const synth = window.speechSynthesis;
    const voicePicker = document.getElementById('voicePicker');
    const langSelect = document.getElementById('langSelect');
    const genderSelect = document.getElementById('genderSelect');
    const textInput = document.getElementById('textInput');
    const translateBtn = document.getElementById('translateBtn');
    
    let allVoices = [];

    // Master list of known gender names to prevent "bleeding" into the wrong category
    const femaleNames = ['ava', 'samantha', 'kyoko', 'nanami', 'siri', 'karen', 'victoria', 'moira', 'martha', 'helena', 'zuzana', 'anna', 'melina', 'shari', 'female'];
    const maleNames = ['brian', 'keita', 'david', 'ichiro', 'tom', 'aaron', 'daniel', 'guy', 'alex', 'fred', 'rishi', 'oliver', 'male', 'ichiro', 'otoya'];

    function populateVoices() {
        allVoices = synth.getVoices();
        const selectedLang = langSelect.value;
        const selectedGender = genderSelect.value;
        
        voicePicker.innerHTML = '';

        // 1. Filter by Language
        let filtered = allVoices.filter(v => v.lang.replace('_', '-').includes(selectedLang));

        // 2. Strict Gender Filtering
        let finalSelection = filtered.filter(v => {
            const name = v.name.toLowerCase();
            
            if (selectedGender === 'male') {
                // To be in Male: Must NOT be in femaleNames list, and ideally matches a male keyword
                const isExplicitlyFemale = femaleNames.some(f => name.includes(f));
                if (isExplicitlyFemale) return false; 
                
                // If it's not explicitly female, check if it's explicitly male or generic
                return true; 
            } else {
                // To be in Female: Must match a female keyword
                return femaleNames.some(f => name.includes(f));
            }
        });

        // 3. Sort (High Quality First)
        finalSelection.sort((a, b) => {
            const premium = ['premium', 'enhanced', 'siri', 'google', 'brian', 'ava', 'keita'];
            let aScore = premium.some(p => a.name.toLowerCase().includes(p)) ? 1 : 0;
            let bScore = premium.some(p => b.name.toLowerCase().includes(p)) ? 1 : 0;
            return bScore - aScore;
        });

        // 4. Fill the Dropdown
        finalSelection.forEach(v => {
            const opt = document.createElement('option');
            opt.value = v.name;
            opt.textContent = v.name.replace('Apple', '').replace('Google', '✨').replace('Microsoft', '').trim();
            voicePicker.appendChild(opt);
        });

        if(voicePicker.options.length === 0) {
            const opt = document.createElement('option');
            opt.textContent = "No match - try another Region";
            voicePicker.appendChild(opt);
        }
    }

    // Translation logic
    translateBtn.onclick = async () => {
        const text = textInput.value;
        if (!text) return;
        translateBtn.innerText = "Translating...";
        try {
            const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|ja`);
            const data = await res.json();
            if (data.responseData.translatedText) {
                textInput.value = data.responseData.translatedText;
                langSelect.value = "ja-JP"; // Switch to Japan
                populateVoices(); // Refresh voices for Japan
            }
        } catch (err) {
            alert("Translate error");
        } finally {
            translateBtn.innerText = "Translate to Japanese 🇯🇵";
        }
    };

    // Events
    if (speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = populateVoices;
    }
    
    langSelect.onchange = populateVoices;
    genderSelect.onchange = populateVoices;
    
    document.getElementById('speakBtn').onclick = () => {
        synth.cancel();
        const text = textInput.value;
        const selectedVoice = allVoices.find(v => v.name === voicePicker.value);
        if (!text || !selectedVoice) return;

        const utter = new SpeechSynthesisUtterance(text);
        utter.voice = selectedVoice;
        utter.rate = document.getElementById('rate').value;
        synth.speak(utter);
    };

    document.getElementById('stopBtn').onclick = () => synth.cancel();
    document.getElementById('rate').oninput = (e) => document.getElementById('speedVal').innerText = e.target.value + 'x';

    // Initial load
    setTimeout(populateVoices, 200);
</script>
</body>
</html>
