<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TextAndSpeak Pro</title>
    <style>
        :root {
            --primary-color: #007AFF;
            --stop-color: #FF3B30;
            --bg-color: #F2F2F7;
            --card-bg: #FFFFFF;
            --text-main: #1C1C1E;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            padding-top: 20px;
            height: 100vh;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .container {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            width: 92%;
            max-width: 450px;
            margin-bottom: 20px;
        }

        h2 { text-align: center; margin: 0 0 15px 0; color: var(--text-main); font-weight: 800; }

        textarea {
            width: 100%;
            height: 140px;
            padding: 16px;
            border: 1px solid #D1D1D6;
            border-radius: 16px;
            font-size: 16px;
            line-height: 1.5;
            box-sizing: border-box;
            background: #F9F9F9;
            outline: none;
            resize: none;
        }

        .top-actions {
            display: flex;
            justify-content: flex-end;
            margin: 8px 0;
        }

        .action-link {
            color: var(--primary-color);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        .select-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }

        .field { display: flex; flex-direction: column; }
        label { font-size: 10px; font-weight: 700; color: #8E8E93; margin-bottom: 4px; text-transform: uppercase; }

        select {
            padding: 0 8px;
            border-radius: 10px;
            border: 1px solid #D1D1D6;
            background: #FFF;
            font-size: 13px;
            height: 40px;
            cursor: pointer;
            width: 100%;
        }

        .full-width { grid-column: span 2; margin-top: 5px; }

        .slider-group { margin-bottom: 20px; }
        .slider-header { display: flex; justify-content: space-between; margin-bottom: 4px; }

        input[type=range] {
            width: 100%;
            cursor: pointer;
            accent-color: var(--primary-color);
        }

        #translateMainBtn {
            width: 100%;
            background: #34C759;
            color: white;
            margin-bottom: 12px;
            display: none;
            height: 44px;
            border-radius: 12px;
            font-size: 15px;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 12px;
        }

        button {
            border: none;
            height: 56px;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.1s ease;
        }

        #speakBtn { background-color: var(--primary-color); color: white; }
        #stopBtn { background-color: #E5E5EA; color: var(--stop-color); }

        @media (prefers-color-scheme: dark) {
            :root { --bg-color: #000; --card-bg: #1C1C1E; --text-main: #FFF; }
            textarea, select { background: #2C2C2E; border-color: #3A3A3C; color: #FFF; }
            #stopBtn { background-color: #3A3A3C; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>TextAndSpeak</h2>
    <textarea id="textInput" placeholder="Type here..."></textarea>
    
    <div class="top-actions">
        <span id="clearBtn" class="action-link">Clear Text</span>
    </div>
    
    <div class="select-group">
        <div class="field">
            <label>Language</label>
            <select id="accentSelect">
                <option value="en-US">🇺🇸 US English</option>
                <option value="en-GB">🇬🇧 UK English</option>
                <option value="ja-JP">🇯🇵 Japanese</option>
            </select>
        </div>
        <div class="field">
            <label>Gender</label>
            <select id="genderSelect">
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>
        </div>
        <div class="field full-width">
            <label>Available Voices</label>
            <select id="voicePicker">
                </select>
        </div>
    </div>

    <div class="slider-group">
        <div class="slider-box">
            <div class="slider-header"><label>Speed</label><span id="speedValue" style="font-size:11px; font-weight:bold;">1.0x</span></div>
            <input type="range" id="rateRange" min="0.5" max="1.5" step="0.05" value="1.0">
        </div>
    </div>

    <button id="translateMainBtn">Translate to Japanese 🇯🇵</button>

    <div class="btn-group">
        <button id="speakBtn">Speak Now</button>
        <button id="stopBtn">Stop</button>
    </div>
</div>

<script>
    const synth = window.speechSynthesis;
    const textInput = document.getElementById('textInput');
    const accentSelect = document.getElementById('accentSelect');
    const genderSelect = document.getElementById('genderSelect');
    const voicePicker = document.getElementById('voicePicker');
    const rateRange = document.getElementById('rateRange');
    const speedValue = document.getElementById('speedValue');
    const speakBtn = document.getElementById('speakBtn');
    const stopBtn = document.getElementById('stopBtn');
    const clearBtn = document.getElementById('clearBtn');
    const translateMainBtn = document.getElementById('translateMainBtn');

    let allVoices = [];
    let manuallySelectedVoice = null;

    function updateVoiceList(isManualChange = false) {
        // Only update the saved preference if the user actually clicked the dropdown
        if (isManualChange) {
            manuallySelectedVoice = voicePicker.value;
        }

        allVoices = synth.getVoices();
        const selectedLang = accentSelect.value;
        const selectedGender = genderSelect.value;

        voicePicker.innerHTML = '';

        let filtered = allVoices.filter(v => v.lang.includes(selectedLang));

        const maleKeywords = ['male', 'guy', 'david', 'andrew', 'nathan', 'james', 'keita', 'ichiro', 'peter', 'ryan', 'brian', 'evan'];
        const femaleKeywords = ['female', 'ava', 'samantha', 'allison', 'jenny', 'nanami', 'kyoko', 'sonia', 'libby', 'aria', 'susan', 'vicky'];

        filtered = filtered.filter(v => {
            const name = v.name.toLowerCase();
            if (selectedGender === 'male') {
                return maleKeywords.some(m => name.includes(m)) && !femaleKeywords.some(f => name.includes(f));
            } else {
                return femaleKeywords.some(f => name.includes(f));
            }
        });

        filtered.forEach(voice => {
            const option = document.createElement('option');
            option.value = voice.name;
            let displayName = voice.name.replace('Microsoft', '').replace('Google', '✨').replace('Apple', '').trim();
            option.textContent = displayName;
            
            // STAY ON THE ONE UNTIL SWITCHED:
            // If this voice matches the one we had selected before, keep it selected.
            if (manuallySelectedVoice === voice.name) {
                option.selected = true;
            }
            
            voicePicker.appendChild(option);
        });

        if (voicePicker.options.length === 0) {
            const fallbackOption = document.createElement('option');
            fallbackOption.textContent = "No specific match found";
            voicePicker.appendChild(fallbackOption);
        }
    }

    // Keep track of manual changes
    voicePicker.addEventListener('change', () => updateVoiceList(true));

    if (speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = () => updateVoiceList(false);
    }

    accentSelect.addEventListener('change', () => {
        manuallySelectedVoice = null; // Reset selection only when language changes
        updateVoiceList();
        translateMainBtn.style.display = (accentSelect.value === 'ja-JP') ? 'block' : 'none';
    });

    genderSelect.addEventListener('change', () => {
        manuallySelectedVoice = null; // Reset selection only when gender changes
        updateVoiceList();
    });

    rateRange.addEventListener('input', () => speedValue.innerText = rateRange.value + "x");

    async function translateToJapanese() {
        const text = textInput.value.trim();
        if (!text) return;
        translateMainBtn.innerText = "Translating...";
        try {
            const response = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|ja`);
            const data = await response.json();
            if (data.responseData.translatedText) textInput.value = data.responseData.translatedText;
        } catch (error) { alert("Translation failed."); }
        finally { translateMainBtn.innerText = "Translate to Japanese 🇯🇵"; }
    }

    function speak() {
        if (synth.speaking) synth.cancel();
        const text = textInput.value.trim();
        if (text !== '') {
            const utterThis = new SpeechSynthesisUtterance(text);
            const selectedVoiceName = voicePicker.value;
            const voice = allVoices.find(v => v.name === selectedVoiceName);

            if (voice) utterThis.voice = voice;
            utterThis.rate = rateRange.value; 
            utterThis.pitch = 1.0; 
            synth.speak(utterThis);
        }
    }

    speakBtn.addEventListener('click', speak);
    stopBtn.addEventListener('click', () => synth.cancel());
    clearBtn.addEventListener('click', () => textInput.value = '');
    translateMainBtn.addEventListener('click', translateToJapanese);

    setTimeout(updateVoiceList, 100);
</script>

</body>
</html>
