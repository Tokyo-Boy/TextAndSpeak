<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TextAndSpeak Pro | Gateway</title>
    <style>
        :root {
            --primary-color: #007AFF;
            --secondary-color: #5856D6;
            --bg-color: #000;
            --card-bg: #1C1C1E;
            --text-main: #FFFFFF;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: var(--text-main);
        }

        h1 {
            margin-bottom: 30px;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .gateway-container {
            display: flex;
            gap: 20px;
            width: 90%;
            max-width: 600px;
            flex-wrap: wrap;
        }

        .choice-card {
            background: var(--card-bg);
            flex: 1;
            min-width: 250px;
            padding: 40px 20px;
            border-radius: 24px;
            text-align: center;
            text-decoration: none;
            color: white;
            border: 1px solid #3A3A3C;
            transition: transform 0.2s, border-color 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .choice-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-color);
        }

        .choice-card:active {
            transform: scale(0.98);
        }

        .icon {
            font-size: 40px;
        }

        .title {
            font-size: 20px;
            font-weight: 700;
        }

        .desc {
            font-size: 13px;
            color: #8E8E93;
            line-height: 1.4;
        }

        .btn {
            margin-top: 10px;
            background: var(--primary-color);
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
        }

        .mobile-btn {
            background: var(--secondary-color);
        }
    </style>
</head>
<body>

    <h1>TextAndSpeak Pro</h1>

    <div class="gateway-container">
        <a href="computer.html" class="choice-card">
            <div class="icon">💻</div>
            <div class="title">Computer Version</div>
            <div class="desc">Uses high-speed local browser engines. Best for Chrome and Edge.</div>
            <div class="btn">Open Desktop</div>
        </a>

        <a href="phone.html" class="choice-card">
            <div class="icon">📱</div>
            <div class="title">Mobile Version</div>
            <div class="desc">Uses Natural Cloud voices to bypass robotic system sounds.</div>
            <div class="btn mobile-btn">Open Mobile</div>
        </a>
    </div>

</body>
</html>
