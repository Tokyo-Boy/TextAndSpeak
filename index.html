<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TextAndSpeak Pro</title>
    <style>
        :root {
            --primary-color: #007AFF;
            --stop-color: #FF3B30;
            --bg-color: #F2F2F7;
            --card-bg: #FFFFFF;
            --text-main: #1C1C1E;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            padding-top: 20px;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
        }

        .container {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            width: 92%;
            max-width: 450px;
        }

        h2 { text-align: center; margin: 0 0 15px 0; color: var(--text-main); font-weight: 800; }

        textarea {
            width: 100%;
            height: 150px;
            padding: 16px;
            border: 1px solid #D1D1D6;
            border-radius: 16px;
            font-size: 16px;
            box-sizing: border-box;
            background: #F9F9F9;
            outline: none;
            resize: none;
            color: var(--text-main);
            margin-bottom: 10px;
        }

        .select-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }

        .field { display: flex; flex-direction: column; }
        label { font-size: 10px; font-weight: 700; color: #8E8E93; margin-bottom: 4px; text-transform: uppercase; }

        select {
            padding: 0 8px;
            border-radius: 10px;
            border: 1px solid #D1D1D6;
            background: #FFF;
            font-size: 14px;
            height: 44px;
            color: var(--text-main);
            -webkit-appearance: none;
        }

        .full-width { grid-column: span 2; }

        .btn-group { display: grid; grid-template-columns: 2fr 1fr; gap: 12px; margin-top: 10px; }

        button {
            border: none;
            height: 56px;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
        }

        #speakBtn { background-color: var(--primary-color); color: white; }
        #stopBtn { background-color: #E5E5EA; color: var(--stop-color); }

        .mobile-note {
            font-size: 11px;
            color: #8E8E93;
            text-align: center;
            margin-top: 12px;
        }

        @media (prefers-color-scheme: dark) {
            :root { --bg-color: #000; --card-bg: #1C1C1E; --text-main: #FFF; }
            textarea, select { background: #2C2C2E; border-color: #3A3A3C; color: #FFF; }
            #stopBtn { background-color: #3A3A3C; }
        }
    </style>
</head>
<body onclick="forceLoad()">

<div class="container">
    <h2>TextAndSpeak</h2>
    <textarea id="textInput" placeholder="Tap here to type..."></textarea>
    
    <div class="select-group">
        <div class="field">
            <label>Region</label>
            <select id="langSelect" onchange="populateVoices()">
                <option value="en-US">USA</option>
                <option value="en-GB">UK (British)</option>
                <option value="ja-JP">Japan</option>
            </select>
        </div>
        <div class="field">
            <label>Gender</label>
            <select id="genderSelect" onchange="populateVoices()">
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>
        </div>
        <div class="field full-width">
            <label>Premium Human Voices</label>
            <select id="voicePicker"></select>
        </div>
    </div>

    <div class="btn-group">
        <button id="speakBtn">Speak Now</button>
        <button id="stopBtn">Stop</button>
    </div>
    
    <p class="mobile-note" id="status">iPhone users: Tap screen once to load voices.</p>
</div>

<script>
    const synth = window.speechSynthesis;
    const voicePicker = document.getElementById('voicePicker');
    const langSelect = document.getElementById('langSelect');
    const genderSelect = document.getElementById('genderSelect');
    const status = document.getElementById('status');
    
    let allVoices = [];

    function forceLoad() {
        if (allVoices.length === 0) {
            populateVoices();
        }
    }

    function populateVoices() {
        allVoices = synth.getVoices();
        if (allVoices.length === 0) return;

        const selectedLang = langSelect.value;
        const selectedGender = genderSelect.value;
        
        voicePicker.innerHTML = '';

        // 1. Language Filter
        let filtered = allVoices.filter(v => v.lang.replace('_', '-').includes(selectedLang));

        // 2. Robotic Filter (Removing "weird" system sounds)
        const robotic = ['cellos', 'bells', 'boing', 'bubbles', 'organ', 'zarvox', 'whisper'];
        filtered = filtered.filter(v => !robotic.some(r => v.name.toLowerCase().includes(r)));

        // 3. Priority Rules
        // Male: Siri Voice 1 (US), Brian (US), Keita/Otoya (JP)
        // Female: Ava, Zoe
        const maleNames = ['siri voice 1', 'brian', 'keita', 'otoya', 'david', 'male'];
        const femaleNames = ['ava', 'zoe', 'siri voice 4', 'siri voice 2', 'siri voice 3', 'samantha', 'kyoko', 'female'];

        let finalSelection = filtered.filter(v => {
            const name = v.name.toLowerCase();
            if (selectedGender === 'male') {
                // If it contains Siri, only allow Voice 1. Otherwise check male names.
                if (name.includes('siri')) return name.includes('1');
                return maleNames.some(m => name.includes(m)) && !femaleNames.some(f => name.includes(f));
            } else {
                // If it contains Siri, only allow Female versions (2, 3, 4).
                if (name.includes('siri')) return !name.includes('1');
                return femaleNames.some(f => name.includes(f));
            }
        });

        // 4. Custom Sort to put your specific favorites at the very top
        finalSelection.sort((a, b) => {
            const aN = a.name.toLowerCase();
            const bN = b.name.toLowerCase();
            const top = ['siri voice 1', 'brian', 'keita', 'ava', 'zoe', 'otoya'];
            
            const aIdx = top.findIndex(t => aN.includes(t));
            const bIdx = top.findIndex(t => bN.includes(t));

            if (aIdx !== -1 && bIdx !== -1) return aIdx - bIdx;
            if (aIdx !== -1) return -1;
            if (bIdx !== -1) return 1;
            return 0;
        });

        // 5. Fill the dropdown
        if (finalSelection.length > 0) {
            status.innerText = "Voices Loaded Successfully";
            finalSelection.forEach(v => {
                const opt = document.createElement('option');
                opt.value = v.name;
                opt.textContent = v.name.replace('Apple', '').replace('Google', '✨').replace('Microsoft', '').trim();
                voicePicker.appendChild(opt);
            });
        } else {
            const opt = document.createElement('option');
            opt.textContent = "No human voices found - Check Settings";
            voicePicker.appendChild(opt);
        }
    }

    // Chrome and Desktop trigger
    if (speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = populateVoices;
    }

    // Speak Action
    document.getElementById('speakBtn').onclick = () => {
        synth.cancel();
        const text = document.getElementById('textInput').value;
        if (!text) return;

        const utter = new SpeechSynthesisUtterance(text);
        const selectedVoice = allVoices.find(v => v.name === voicePicker.value);
        if (selectedVoice) utter.voice = selectedVoice;
        synth.speak(utter);
    };

    document.getElementById('stopBtn').onclick = () => synth.cancel();

    // Try initial load
    setTimeout(populateVoices, 200);
</script>
</body>
</html>
